commands:
  inspect:
    description: "Inspect Gateway H5AD schema in backed mode."
    command: "make inspect"
    inputs: ["data/raw/gateway.h5ad"]
    outputs: ["results/reports/h5ad_schema.json", "data/metadata/gateway_obs_columns.tsv", "data/metadata/gateway_var_columns.tsv"]
  cohort:
    description: "Build donor/sample cohort manifest and cohort summary."
    command: "make cohort"
    inputs: ["data/raw/gateway.h5ad", "resources/scvi/full_4m_genes.txt", "configs/gateway.yaml"]
    outputs: ["data/processed/cohort_manifest.tsv", "results/tables/cohort_summary.tsv"]
  aggregate:
    description: "Aggregate donor/fine-cell-state counts and composition features."
    command: "make aggregate"
    inputs: ["data/raw/gateway.h5ad", "data/processed/cohort_manifest.tsv"]
    outputs: ["data/processed/donor_cell_state_counts.tsv", "data/processed/donor_cell_state_features.tsv"]
  features:
    description: "Build composition-only ORA feature matrix."
    command: "make features"
    inputs: ["data/processed/donor_cell_state_features.tsv"]
    outputs: ["data/processed/ora_feature_matrix.tsv"]
  modules:
    description: "Score curated modules and build donor module features."
    command: "make modules"
    inputs: ["data/raw/gateway.h5ad", "configs/gene_sets.yaml"]
    outputs: ["results/tables/module_score_summary.tsv", "results/tables/module_gene_coverage.tsv", "data/processed/donor_module_features.tsv"]
  features_augmented:
    description: "Build composition-plus-module ORA feature matrix."
    command: "make features-augmented"
    inputs: ["data/processed/donor_cell_state_features.tsv", "data/processed/donor_module_features.tsv"]
    outputs: ["data/processed/ora_augmented_feature_matrix.tsv"]
  age_associations:
    description: "Run donor-level age association tests for ORA features."
    command: "make age-associations"
    inputs: ["data/processed/donor_cell_state_features.tsv", "data/processed/cohort_manifest.tsv"]
    outputs: ["results/tables/age_cell_state_associations.tsv"]
  compositional_age_model:
    description: "Run donor-level CLR compositional age models with cohort sensitivities."
    command: "make compositional-age-model"
    inputs:
      - "data/processed/donor_cell_state_counts.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "results/tables/age_cell_state_associations.tsv"
      - "configs/gateway.yaml"
    outputs:
      - "results/tables/compositional_age_model_summary.tsv"
      - "results/tables/compositional_age_model_sensitivity.tsv"
      - "results/figures/extended_data_compositional_model.pdf"
      - "results/figures/extended_data_compositional_model.png"
  negative_controls:
    description: "Run age-shuffle, technical-only, yield-only, and covariate-explainability negative controls."
    command: "make negative-controls"
    inputs:
      - "data/processed/ora_augmented_feature_matrix.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "results/tables/augmented_donor_ora_scores.tsv"
      - "results/tables/ora_augmented_candidate_repeated_cv_summary.tsv"
      - "configs/models.yaml"
      - "configs/gateway.yaml"
    outputs:
      - "results/tables/ora_negative_control_performance.tsv"
      - "results/tables/ora_technical_baseline_comparison.tsv"
      - "results/tables/ora_covariate_explainability.tsv"
      - "results/figures/extended_data_negative_controls.pdf"
      - "results/figures/extended_data_negative_controls.png"
  feature_family_ablation:
    description: "Run matched-split feature-family ablations across ORA composition, modules, scVI, pseudobulk PCs, technical-only, and null baselines."
    command: "make feature-family-ablation"
    inputs:
      - "data/processed/ora_scvi_hybrid_feature_matrix.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "data/processed/pseudobulk_genomewide_counts.tsv.gz"
      - "data/processed/pseudobulk_genomewide_metadata.tsv"
      - "configs/models.yaml"
      - "configs/gateway.yaml"
    outputs:
      - "data/processed/feature_family_ablation"
      - "results/tables/ora_feature_family_ablation_summary.tsv"
      - "results/tables/ora_feature_family_ablation_deltas.tsv"
      - "results/tables/ora_feature_family_ablation_feasibility.tsv"
      - "results/tables/ora_feature_family_ablation_repeat_performance.tsv"
      - "results/tables/ora_feature_family_ablation_scores.tsv"
      - "results/figures/manuscript_figure_feature_ablation.pdf"
      - "results/figures/manuscript_figure_feature_ablation.png"
  leave_context_out:
    description: "Train hybrid ORA/scVI models while holding out one donor context level at a time, recording skipped contexts and held-out performance."
    command: "make leave-context-out"
    inputs:
      - "data/processed/ora_scvi_hybrid_feature_matrix.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "configs/models.yaml"
      - "configs/gateway.yaml"
    outputs:
      - "results/tables/ora_leave_context_out_performance.tsv"
      - "results/tables/ora_leave_context_out_summary.tsv"
      - "results/tables/ora_leave_context_out_scores.tsv"
      - "results/tables/ora_leave_context_out_feature_stability.tsv"
      - "results/tables/ora_leave_context_out_feasibility.tsv"
  foundation_benchmark_subsets:
    description: "Write fixed Gateway H5AD subsets, donor folds, and gene manifests for Geneformer, scGPT, scFoundation, and aging-clock-style benchmarks."
    command: "make foundation-benchmark-subsets"
    inputs:
      - "data/raw/gateway.h5ad"
      - "configs/gateway.yaml"
      - "configs/models.yaml"
      - "docs/foundation_model_benchmark_plan.md"
    outputs:
      - "data/processed/foundation_benchmark_lineage_subset.h5ad"
      - "data/processed/foundation_benchmark_epithelial_subset.h5ad"
      - "data/processed/foundation_benchmark_allcell_subset.h5ad"
      - "results/tables/foundation_benchmark_subset_manifest.tsv"
      - "results/tables/foundation_benchmark_donor_splits.tsv"
      - "results/tables/foundation_benchmark_gene_manifest.tsv"
      - "resources/foundation_benchmark/gateway_gene_symbols.txt"
      - "resources/foundation_benchmark/gateway_gene_ids.txt"
  aging_clock_baseline:
    description: "Run leakage-safe fold-internal pseudobulk expression-PC age models as the aging-clock-style baseline."
    command: "make aging-clock-baseline"
    inputs:
      - "data/processed/pseudobulk_genomewide_counts.tsv.gz"
      - "data/processed/pseudobulk_genomewide_metadata.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "configs/models.yaml"
      - "docs/foundation_model_benchmark_plan.md"
    outputs:
      - "results/tables/aging_clock_baseline_feasibility.tsv"
      - "results/tables/aging_clock_baseline_performance.tsv"
      - "results/tables/aging_clock_baseline_repeat_performance.tsv"
      - "results/tables/aging_clock_baseline_scores.tsv"
      - "results/tables/aging_clock_baseline_feature_stability.tsv"
      - "results/tables/aging_clock_baseline_model_comparison.tsv"
  foundation_model_benchmark:
    description: "Extract local Geneformer donor embeddings, run repeated donor-level age models, and summarize deferred scGPT/scFoundation benchmark status."
    command: "make foundation-model-benchmark"
    inputs:
      - "data/processed/foundation_benchmark_lineage_subset.h5ad"
      - "resources/foundation_models/geneformer_v1_10m/Geneformer-V1-10M/config.json"
      - "resources/foundation_models/geneformer_v1_10m/Geneformer-V1-10M/model.safetensors"
      - "resources/foundation_models/geneformer_v1_10m/geneformer/gene_dictionaries_30m/token_dictionary_gc30M.pkl"
      - "resources/foundation_models/geneformer_v1_10m/geneformer/gene_dictionaries_30m/gene_median_dictionary_gc30M.pkl"
      - "data/processed/cohort_manifest.tsv"
      - "configs/models.yaml"
      - "docs/foundation_model_benchmark_plan.md"
    outputs:
      - "data/processed/geneformer_donor_features.tsv"
      - "results/tables/geneformer_embedding_qc.tsv"
      - "results/tables/foundation_model_gene_coverage.tsv"
      - "results/tables/foundation_model_runtime.tsv"
      - "results/tables/geneformer_repeated_cv_performance.tsv"
      - "results/tables/geneformer_age_model_summary.tsv"
      - "results/tables/geneformer_scores.tsv"
      - "results/tables/geneformer_feature_stability.tsv"
      - "results/tables/foundation_model_benchmark.tsv"
  cross_tissue_specificity:
    description: "Build the M6 cross-tissue comparator plan and first-pass ORA feature specificity classification."
    command: "make cross-tissue-specificity"
    inputs:
      - "data/processed/ora_augmented_feature_matrix.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "results/tables/ora_augmented_candidate_repeated_cv_feature_stability.tsv"
      - "results/tables/ora_feature_interpretation.tsv"
      - "configs/external_datasets.yaml"
    outputs:
      - "docs/cross_tissue_specificity_plan.md"
      - "results/tables/cross_tissue_candidate_matrix.tsv"
      - "results/tables/ora_cross_tissue_feature_classification.tsv"
      - "results/tables/ora_cross_tissue_specificity.tsv"
      - "results/figures/extended_data_cross_tissue_specificity.pdf"
      - "results/figures/extended_data_cross_tissue_specificity.png"
  cross_tissue_age_effects:
    description: "Estimate donor-level age effects in selected public CELLxGENE nasal/bronchial/lung comparator datasets."
    command: "make cross-tissue-age-effects"
    inputs:
      - "configs/cross_tissue_age_effects.yaml"
      - "configs/gene_sets.yaml"
      - "configs/regeneration_gene_sets.yaml"
      - "results/tables/ora_cross_tissue_feature_classification.tsv"
      - "data/external/cellxgene/e3cc5b85-62ec-4add-bee3-73c8fd11e59d.h5ad"
      - "data/external/cellxgene/d2bc2703-a9b5-4949-b85d-61da7b9961b1.h5ad"
      - "data/external/cellxgene/3de0ad6d-4378-4f62-b37b-ec0b75a50d94.h5ad"
    outputs:
      - "docs/cross_tissue_age_effects.md"
      - "results/tables/cross_tissue_cellxgene_asset_inventory.tsv"
      - "data/processed/cross_tissue_cellxgene_donor_features.tsv"
      - "results/tables/cross_tissue_cellxgene_module_coverage.tsv"
      - "results/tables/cross_tissue_age_effects.tsv"
      - "results/tables/ora_cross_tissue_age_effect_summary.tsv"
  spatial_validation_plan:
    description: "Build public spatial-data triage, ORA marker panel, and histology/spatial validation design."
    command: "make spatial-validation-plan"
    inputs:
      - "configs/external_datasets.yaml"
      - "configs/spatial_validation_markers.yaml"
    outputs:
      - "docs/spatial_perturbation_validation_plan.md"
      - "results/tables/spatial_validation_candidate_matrix.tsv"
      - "results/tables/spatial_validation_marker_panel.tsv"
      - "results/tables/spatial_validation_readout_plan.tsv"
      - "results/tables/spatial_validation_search_log.tsv"
  perturbation_validation_plan:
    description: "Build public perturbation/organoid/ALI candidate triage and minimum experimental validation design."
    command: "make perturbation-validation-plan"
    inputs:
      - "configs/perturbation_validation_candidates.yaml"
    outputs:
      - "docs/perturbation_validation_plan.md"
      - "results/tables/perturbation_validation_candidate_matrix.tsv"
      - "results/tables/perturbation_validation_search_log.tsv"
      - "results/tables/perturbation_minimum_experiment_design.tsv"
  perturbation_gse309325_organoid:
    description: "Score GSE309325 human nasal/olfactory organoid SARS-CoV-2 perturbation modules."
    command: "make perturbation-gse309325-organoid"
    inputs:
      - "data/external/GSE309325_RAW.tar"
      - "configs/gene_sets.yaml"
      - "configs/regeneration_gene_sets.yaml"
    outputs:
      - "docs/gse309325_organoid_adapter_status.md"
      - "results/tables/gse309325_organoid_sample_qc.tsv"
      - "results/tables/gse309325_organoid_module_scores.tsv"
      - "results/tables/gse309325_organoid_module_coverage.tsv"
      - "results/tables/gse309325_organoid_module_contrasts.tsv"
  regeneration_axis_feature_map:
    description: "Build the M5.1 regeneration-axis controlled-vocabulary feature map and theme summary."
    command: "make regeneration-axis-feature-map"
    inputs:
      - "data/processed/ora_augmented_feature_matrix.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "results/tables/ora_augmented_candidate_repeated_cv_feature_stability.tsv"
      - "results/tables/ora_cross_tissue_feature_classification.tsv"
    outputs:
      - "resources/feature_maps/regeneration_axis_feature_map.tsv"
      - "results/tables/regeneration_axis_feature_map.tsv"
      - "results/tables/regeneration_axis_theme_summary.tsv"
      - "results/figures/manuscript_figure_regeneration_axis.pdf"
      - "results/figures/manuscript_figure_regeneration_axis.png"
  regeneration_modules:
    description: "Score M5.2 curated OE regeneration pathway modules on Gateway cells and donor summaries."
    command: "make regeneration-modules"
    inputs:
      - "data/raw/gateway.h5ad"
      - "configs/gateway.yaml"
      - "configs/regeneration_gene_sets.yaml"
    outputs:
      - "results/tables/regeneration_module_score_summary.tsv"
      - "results/tables/regeneration_module_gene_coverage.tsv"
      - "data/processed/regeneration_donor_module_features.tsv"
  regeneration_module_analysis:
    description: "Test curated regeneration modules for age association and ORA-feature correlations."
    command: "make regeneration-module-analysis"
    inputs:
      - "configs/regeneration_gene_sets.yaml"
      - "data/processed/regeneration_donor_module_features.tsv"
      - "results/tables/regeneration_module_gene_coverage.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "data/processed/ora_augmented_feature_matrix.tsv"
      - "results/tables/regeneration_axis_feature_map.tsv"
    outputs:
      - "results/tables/regeneration_module_age_associations.tsv"
      - "results/tables/regeneration_module_ora_correlations.tsv"
  regulatory_driver_analysis:
    description: "Score curated regulatory-driver target programs from genomewide pseudobulk and rank age/ORA driver hypotheses."
    command: "make regulatory-driver-analysis"
    inputs:
      - "configs/regulatory_driver_gene_sets.yaml"
      - "data/processed/pseudobulk_genomewide_counts.tsv.gz"
      - "data/processed/pseudobulk_genomewide_metadata.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "results/tables/ora_augmented_candidate_repeated_cv_scores.tsv"
    outputs:
      - "docs/regulatory_driver_feasibility.md"
      - "results/tables/regulatory_driver_activity.tsv"
      - "results/tables/regulatory_driver_donor_activity.tsv"
      - "results/tables/regulatory_driver_gene_coverage.tsv"
      - "results/tables/regulatory_driver_map.tsv"
      - "results/tables/regulatory_driver_age_associations.tsv"
      - "results/tables/regulatory_driver_ora_correlations.tsv"
      - "results/figures/extended_data_regulatory_drivers.pdf"
      - "results/figures/extended_data_regulatory_drivers.png"
  niche_signaling_analysis:
    description: "Score curated ligand-receptor niche interactions by donor, sender group, and receiver group, then test age and ORA associations."
    command: "make niche-signaling-analysis"
    inputs:
      - "configs/niche_ligand_receptor_pairs.yaml"
      - "data/processed/pseudobulk_genomewide_counts.tsv.gz"
      - "data/processed/pseudobulk_genomewide_metadata.tsv"
      - "data/processed/cohort_manifest.tsv"
      - "results/tables/ora_augmented_candidate_repeated_cv_scores.tsv"
    outputs:
      - "docs/niche_signaling_feasibility.md"
      - "results/tables/niche_ligand_receptor_donor_scores.tsv"
      - "results/tables/niche_ligand_receptor_gene_coverage.tsv"
      - "results/tables/niche_ligand_receptor_age_associations.tsv"
      - "results/tables/niche_ligand_receptor_ora_associations.tsv"
      - "results/tables/niche_driver_priority_table.tsv"
      - "results/figures/extended_data_niche_signaling.pdf"
      - "results/figures/extended_data_niche_signaling.png"
  regeneration_dynamics:
    description: "Audit fate-method input feasibility and run an exploratory DPT pilot on the basal-to-neuronal lineage embedding."
    command: "make regeneration-dynamics"
    inputs:
      - "data/raw/gateway.h5ad"
      - "data/processed/gateway_scvi_lineage_basal_neural_100k.h5ad"
      - "data/processed/foundation_benchmark_lineage_subset.h5ad"
      - "data/processed/gateway_scvi_full_4m_reduced.h5ad"
    outputs:
      - "results/tables/regeneration_dynamics_input_audit.tsv"
      - "results/tables/regeneration_dynamics_feasibility.tsv"
      - "results/reports/regeneration_dynamics_feasibility.md"
      - "results/tables/regeneration_dynamics_summary.tsv"
      - "results/tables/regeneration_dynamics_cell_scores.tsv"
      - "results/figures/extended_data_regeneration_dynamics.pdf"
      - "results/figures/extended_data_regeneration_dynamics.png"
  model_ora:
    description: "Train donor-split ORA models on healthy donors."
    command: "make model-ora"
    inputs: ["data/processed/ora_feature_matrix.tsv", "data/processed/cohort_manifest.tsv", "configs/models.yaml"]
    outputs: ["results/tables/ora_model_performance.tsv", "results/tables/donor_ora_scores.tsv", "results/tables/ora_feature_importance.tsv"]
  model_ora_augmented:
    description: "Train donor-split ORA models with composition plus module features."
    command: "make model-ora-augmented"
    inputs: ["data/processed/ora_augmented_feature_matrix.tsv", "data/processed/cohort_manifest.tsv", "configs/models.yaml"]
    outputs: ["results/tables/ora_augmented_model_performance.tsv", "results/tables/augmented_donor_ora_scores.tsv", "results/tables/ora_augmented_feature_importance.tsv"]
  model_ora_diagnostics:
    description: "Summarize ORA calibration, age-bin errors, and residual diagnostics."
    command: "make model-ora-diagnostics"
    inputs: ["results/tables/donor_ora_scores.tsv", "data/processed/cohort_manifest.tsv", "configs/models.yaml"]
    outputs: ["results/tables/ora_calibration.tsv", "results/tables/ora_age_bin_errors.tsv", "results/tables/ora_residual_diagnostics.tsv", "results/tables/ora_calibrated_scores.tsv"]
  model_ora_repeated:
    description: "Run repeated donor-level CV and feature stability."
    command: "make model-ora-repeated"
    inputs: ["data/processed/ora_feature_matrix.tsv", "data/processed/cohort_manifest.tsv", "configs/models.yaml"]
    outputs: ["results/tables/ora_repeated_cv_summary.tsv", "results/tables/ora_repeated_cv_feature_stability.tsv"]
  model_ora_candidate_repeated:
    description: "Run targeted repeated CV for module-augmented boosted candidate models."
    command: "make model-ora-candidate-repeated"
    inputs: ["data/processed/ora_augmented_feature_matrix.tsv", "data/processed/cohort_manifest.tsv", "configs/models.yaml"]
    outputs: ["results/tables/ora_augmented_candidate_repeated_cv_performance.tsv", "results/tables/ora_augmented_candidate_repeated_cv_summary.tsv", "results/tables/ora_augmented_candidate_repeated_cv_scores.tsv", "results/tables/ora_augmented_candidate_repeated_cv_feature_stability.tsv"]
  environment_report:
    description: "Record Python/R runtime, lock files, full pip freeze, and smoke-test status."
    command: "make environment-report"
    inputs: ["pyproject.toml", "environment.yml", "scripts/build_environment_report.py"]
    outputs:
      - "results/reports/environment_report.tsv"
      - "results/reports/environment_report.md"
      - "results/reports/environment_smoke_tests.tsv"
      - "requirements/python-base-lock.txt"
      - "requirements/python-latent-lock.txt"
      - "requirements/python-full-freeze.txt"
      - "environments/r-bioconductor.yml"
  feature_interpretation:
    description: "Map stable ORA features to broad regenerative, neuronal, immune, secretory, and stress themes."
    command: "make feature-interpretation"
    inputs: ["results/tables/ora_augmented_repeated_cv_feature_stability.tsv", "results/tables/age_cell_state_associations.tsv"]
    outputs: ["results/tables/ora_feature_interpretation.tsv"]
  project_ndd:
    description: "Project frozen healthy-trained ORA models onto AD/PD donors."
    command: "make project-ndd"
    inputs: ["data/processed/ora_augmented_feature_matrix.tsv", "data/processed/cohort_manifest.tsv", "configs/models.yaml"]
    outputs: ["results/tables/ndd_ora_projection.tsv", "results/tables/ndd_ora_projection_summary.tsv"]
  project_ndd_uncertainty:
    description: "Bootstrap NDD ORAA uncertainty and matched healthy context."
    command: "make project-ndd-uncertainty"
    inputs: ["results/tables/ndd_ora_projection.tsv"]
    outputs: ["results/tables/ndd_ora_projection_uncertainty.tsv", "results/tables/ndd_ora_projection_context.tsv"]
  pseudobulk_targeted:
    description: "Aggregate curated-gene pseudobulk and run targeted contrasts."
    command: "make pseudobulk"
    inputs: ["data/raw/gateway.h5ad", "configs/gene_sets.yaml"]
    outputs: ["data/processed/pseudobulk_counts.tsv.gz", "data/processed/pseudobulk_metadata.tsv", "results/tables/pseudobulk_de.tsv"]
  pseudobulk_covariate_de:
    description: "Run targeted covariate-adjusted donor-level pseudobulk models."
    command: "make pseudobulk-covariate-de"
    inputs: ["data/processed/pseudobulk_counts.tsv.gz", "data/processed/pseudobulk_metadata.tsv", "data/processed/cohort_manifest.tsv"]
    outputs: ["results/tables/pseudobulk_covariate_de.tsv"]
  pseudobulk_genomewide_export:
    description: "Stream all genes into genome-wide pseudobulk count matrix."
    command: "make pseudobulk-genomewide"
    inputs: ["data/raw/gateway.h5ad", "configs/gateway.yaml"]
    outputs: ["data/processed/pseudobulk_genomewide_counts.tsv.gz", "data/processed/pseudobulk_genomewide_metadata.tsv", "data/processed/pseudobulk_genomewide_genes.tsv"]
  pseudobulk_genomewide_qc:
    description: "Summarize genome-wide pseudobulk matrix QC."
    command: "make pseudobulk-genomewide-qc"
    inputs: ["data/processed/pseudobulk_genomewide_counts.tsv.gz", "data/processed/pseudobulk_genomewide_metadata.tsv"]
    outputs: ["results/tables/pseudobulk_genomewide_qc_summary.tsv", "results/tables/pseudobulk_genomewide_gene_qc.tsv", "results/tables/pseudobulk_genomewide_group_qc.tsv"]
  pseudobulk_genomewide_edger:
    description: "Run genome-wide edgeR quasi-likelihood models."
    command: "make pseudobulk-genomewide-edger"
    inputs: ["data/processed/pseudobulk_genomewide_counts.tsv.gz", "data/processed/pseudobulk_genomewide_metadata.tsv", "data/processed/cohort_manifest.tsv"]
    outputs: ["results/tables/pseudobulk_genomewide_edger.tsv.gz", "results/tables/pseudobulk_genomewide_edger_summary.tsv"]
  pseudobulk_genomewide_edger_matched:
    description: "Run genome-wide edgeR on the matched FLEX v2/device donor subset."
    command: "make pseudobulk-genomewide-edger-matched"
    inputs: ["data/processed/pseudobulk_genomewide_counts.tsv.gz", "data/processed/pseudobulk_genomewide_metadata.tsv", "data/processed/cohort_manifest.tsv"]
    outputs: ["results/tables/pseudobulk_genomewide_edger_matched_flex_v2_device.tsv.gz", "results/tables/pseudobulk_genomewide_edger_matched_flex_v2_device_summary.tsv"]
  pseudobulk_genomewide_limma_voom:
    description: "Run genome-wide limma-voom models as a parity analysis."
    command: "make pseudobulk-genomewide-limma"
    inputs: ["data/processed/pseudobulk_genomewide_counts.tsv.gz", "data/processed/pseudobulk_genomewide_metadata.tsv", "data/processed/cohort_manifest.tsv"]
    outputs: ["results/tables/pseudobulk_genomewide_limma_voom.tsv.gz", "results/tables/pseudobulk_genomewide_limma_voom_summary.tsv"]
  pseudobulk_genomewide_limma_voom_matched:
    description: "Run genome-wide limma-voom on the matched FLEX v2/device donor subset."
    command: "make pseudobulk-genomewide-limma-matched"
