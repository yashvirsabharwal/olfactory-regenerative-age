random_seed: 42
outer_cv_folds: 5
outer_cv_repeats: 10
inner_cv_folds: 5

age_bins:
  young: [0, 49]
  middle: [50, 69]
  old: [70, 120]

missingness_max_fraction: 0.30
imputation: "median"
scaling: "standard"

exclude_from_biological_features:
  - "total_cells"
  - "total_umi"
  - "log10_total_cells"
  - "log10_total_umi"
  - "chemistry"
  - "collection_method"
  - "site"

models:
  null:
    enabled: true
  ridge:
    enabled: true
    alphas: [0.1, 1.0, 10.0, 100.0]
  lasso:
    enabled: true
    alphas: [0.001, 0.01, 0.1, 1.0, 10.0]
    max_iter: 50000
    tol: 0.01
    n_jobs: -1
  elastic_net:
    enabled: true
    alphas: [0.01, 0.1, 1.0, 10.0]
    l1_ratios: [0.1, 0.5, 0.9, 1.0]
    max_iter: 50000
    tol: 0.001
    n_jobs: -1
  random_forest:
    enabled: true
    n_estimators: 500
    max_depth: 5
  extra_trees:
    enabled: true
    n_estimators: 500
    max_depth: 5
    min_samples_leaf: 2
    max_features: "sqrt"
  gradient_boosting:
    enabled: true
    n_estimators: 250
    learning_rate: 0.03
    max_depth: 2
    min_samples_leaf: 5
    subsample: 0.8
  hist_gradient_boosting:
    enabled: true
    max_iter: 250
    learning_rate: 0.03
    max_leaf_nodes: 7
    min_samples_leaf: 8
    l2_regularization: 5.0
    importance_repeats: 0
  tree_ensemble:
    enabled: true
  xgboost:
    enabled: true
    n_estimators: 300
    learning_rate: 0.03
    max_depth: 2
    min_child_weight: 3.0
    subsample: 0.8
    colsample_bytree: 0.8
    reg_lambda: 5.0
    reg_alpha: 0.0
  lightgbm:
    enabled: true
    n_estimators: 300
    learning_rate: 0.03
    max_depth: 2
    num_leaves: 7
    min_child_samples: 8
    subsample: 0.8
    colsample_bytree: 0.8
    reg_lambda: 5.0
  catboost:
    enabled: true
    iterations: 300
    learning_rate: 0.03
    depth: 3
    l2_leaf_reg: 10.0
  boosted_ensemble:
    enabled: true
