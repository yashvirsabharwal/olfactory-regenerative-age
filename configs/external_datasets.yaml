published_gene_lists:
  aging:
    description: "General cellular aging and senescence markers for external validation."
    source: "curated_initial"
    genes: [CDKN1A, CDKN2A, TP53, SERPINE1, MMP3, IL6, CXCL8, LMNB1]
  olfactory_regeneration:
    description: "Olfactory epithelial regeneration and neurogenesis markers."
    source: "curated_initial"
    genes: [TP63, KRT5, KRT14, SOX2, ASCL1, NEUROG1, NEUROD1, GAP43, DCX, OMP]
  neurodegeneration_risk:
    description: "AD/PD-associated genes used for cross-disease validation."
    source: "curated_initial"
    genes: [APP, PSEN1, PSEN2, MAPT, APOE, SNCA, LRRK2, PRKN, PINK1, PARK7, GBA1]
  neuroinflammation:
    description: "Myeloid/complement inflammatory response genes."
    source: "curated_initial"
    genes: [AIF1, C1QA, C1QB, C1QC, TREM2, TYROBP, LST1]

marker_panels:
  quiescent_hbc:
    description: "Horizontal basal-cell markers used for marker-only external composition sanity checks."
    genes: [TP63, KRT5, KRT14, CXCL14]
  activated_hbc:
    description: "Activated basal and wound-response epithelial markers."
    genes: [KRT6A, KRT6B, KRT16, SERPINB3]
  cycling:
    description: "Cycling/proliferative markers."
    genes: [MKI67, TOP2A, UBE2C, HMGB2]
  neural_progenitor:
    description: "Early olfactory neuronal progenitor markers."
    genes: [ASCL1, NEUROG1, NEUROD1, STMN2]
  immature_osn:
    description: "Immature olfactory sensory neuron markers."
    genes: [GAP43, DCX, TUBB3, STMN2]
  mature_osn:
    description: "Mature olfactory sensory neuron markers."
    genes: [OMP, ADCY3, GNAL, RTP1]
  sustentacular:
    description: "Sustentacular/supporting epithelial markers."
    genes: [CYP2A13, CYP2J2, MUC1, SOX2]
  bowman_gland:
    description: "Bowman gland/secretory gland markers."
    genes: [LTF, BPIFB1, MUC5B, BPIFA1]
  respiratory_ciliated:
    description: "Respiratory/ciliated epithelial markers."
    genes: [FOXJ1, PIFO, TPPP3, DNAH5]
  goblet_secretory:
    description: "Goblet and secretory epithelial markers."
    genes: [MUC5AC, MUC5B, SPDEF, AGR2]
  immune:
    description: "Pan-immune and leukocyte markers."
    genes: [PTPRC, LST1, TYROBP, CD3D, MS4A1]

feature_matrix_contract:
  description: "Minimum donor-level table needed to test ORA feature replication outside Gateway."
  required_columns:
    - donor_id
    - age
    - disease_group
  optional_covariates:
    - sex
    - chemistry
    - collection_method
    - site
  accepted_feature_prefixes:
    - "prop__"
    - "clr__"
    - "ratio__"
    - "module_score__"

public_data_exhaustion:
  conclusion: "No stronger public independent donor-level human olfactory epithelial healthy-aging sc/snRNA dataset was identified. GSE184117 remains the most direct public validation target; olfactory disease/smell-loss datasets and nasal/airway/lung resources are useful as mapped or contextual evidence."
  search_log:
    - search_date: "2026-06-24"
      database_or_resource: "Local ORA repository"
      query_or_filter: "configs/external_datasets.yaml; results/tables/external_candidate_matrix.tsv; results/tables/external_validation_evidence.tsv; milestone M3.3"
    - search_date: "2026-06-24"
      database_or_resource: "NCBI GEO DataSets / ESearch"
      query_or_filter: "olfactory AND Homo sapiens"
    - search_date: "2026-06-24"
      database_or_resource: "NCBI GEO DataSets / ESearch"
      query_or_filter: "(olfactory mucosa OR olfactory epithelium OR olfactory neuroepithelium) AND Homo sapiens AND (single cell OR single-cell OR RNA-seq OR spatial)"
    - search_date: "2026-06-24"
      database_or_resource: "NCBI GEO DataSets / ESearch"
      query_or_filter: "(anosmia OR hyposmia OR presbyosmia OR olfactory loss) AND Homo sapiens"
    - search_date: "2026-06-24"
      database_or_resource: "NCBI GEO DataSets / ESearch"
      query_or_filter: "(nasal OR airway OR respiratory epithelium) AND Homo sapiens AND (single cell OR single-cell OR snRNA OR spatial) AND (age OR aging OR adult)"
    - search_date: "2026-06-24"
      database_or_resource: "NCBI GEO DataSets / ESearch"
      query_or_filter: "(nasal polyp OR chronic rhinosinusitis OR CRS) AND Homo sapiens AND (single cell OR single-cell)"
    - search_date: "2026-06-24"
      database_or_resource: "NCBI GEO DataSets / ESearch"
      query_or_filter: "(olfactory OR nasal) AND Homo sapiens AND (spatial transcriptomics OR Visium OR GeoMx OR Xenium OR histology)"
    - search_date: "2026-06-24"
