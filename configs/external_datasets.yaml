datasets:
  durante_2020:
    title: "Human olfactory mucosa lineage reference"
    status: "metadata_pending"
    validation_use: "lineage marker and trajectory-order validation"
    species: "human"
    tissue: "olfactory mucosa"
    disease_context: ["healthy"]
    expected_level: "single_cell"
    path: null
    required_files:
      expression: null
      metadata: null
      feature_matrix: null
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Use for lineage/cell-state feature replication once source files are supplied."

  oliva_2022:
    title: "Aging-related olfactory loss is associated with olfactory stem cell transcriptional alterations in humans"
    accession: "GSE184117"
    bioproject: "PRJNA763212"
    sra: "SRP337058"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE184117"
    supplementary_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE184nnn/GSE184117/suppl/GSE184117_RAW.tar"
    series_matrix_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE184nnn/GSE184117/matrix/GSE184117_series_matrix.txt.gz"
    status: "download_ready"
    validation_use: "aging and presbyosmia feature replication"
    species: "human"
    tissue: "olfactory epithelium"
    disease_context: ["aging", "presbyosmia"]
    expected_level: "single_cell"
    cohort_notes: "6 adult donors: 3 normosmic controls and 3 presbyosmic donors older than 65; plus one culture sample."
    data_notes: "Processed supplementary TAR contains MTX/TSV files; raw data also available in SRA."
    path: "data/external/GSE184117_RAW.tar"
    required_files:
      expression: "data/external/GSE184117_RAW.tar"
      metadata: "data/external/GSE184117_series_matrix.txt.gz"
      feature_matrix: null
    download_command: "curl -L -o data/external/GSE184117_RAW.tar https://ftp.ncbi.nlm.nih.gov/geo/series/GSE184nnn/GSE184117/suppl/GSE184117_RAW.tar"
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Primary external aging validation target. GEO summary states single-cell 3' RNA-seq of olfactory epithelium from normosmic and presbyosmic adults."

  fodoulian_2020:
    title: "A gateway for SARS-CoV-2 infection in the human olfactory neuroepithelium"
    accession: "GSE151973"
    bioproject: "PRJNA637909"
    sra: "SRP266345"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE151973"
    status: "download_ready_bulk_reference"
    validation_use: "bulk olfactory versus respiratory epithelium marker sanity check"
    species: "human"
    tissue: "olfactory neuroepithelium"
    disease_context: ["healthy_or_surgical_reference"]
    expected_level: "bulk_rnaseq"
    cohort_notes: "Bulk olfactory and nasal respiratory epithelium biopsies from adult surgical patients; useful for marker sanity checks but not donor-level ORA validation."
    path: "data/external/GSE151973_Human_OE_RE_RNAseq_DE.csv.gz"
    required_files:
      expression: "data/external/GSE151973_Human_OE_RE_RNAseq_quantifications.rds.gz"
      metadata: "data/external/GSE151973_Human_OE_RE_RNAseq_DE.csv.gz"
      feature_matrix: null
    download_command: "curl -L -O https://ftp.ncbi.nlm.nih.gov/geo/series/GSE151nnn/GSE151973/suppl/GSE151973_Human_OE_RE_RNAseq_DE.csv.gz"
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id", "patient"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis", "tissue"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Not a primary ORA validation dataset because it is bulk tissue RNA-seq, but useful for olfactory epithelial marker and OE/RE contrast checks."

  brann_2020:
    title: "Non-neuronal expression of SARS-CoV-2 entry genes in the olfactory system suggests mechanisms underlying COVID-19-associated anosmia"
    accession: "GSE151346"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE151346"
    supplementary_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE151nnn/GSE151346/suppl/GSE151346_MOE_metadata.tsv.gz"
    status: "cross_species_context_only"
    validation_use: "mouse olfactory epithelium cell-state and regeneration-module context; not human donor-level ORA validation"
    species: "mouse"
    tissue: "main olfactory epithelium"
    disease_context: ["covid_anosmia_context", "healthy_or_surgical_reference"]
    expected_level: "single_cell"
    cohort_notes: "GEO reports organism Mus musculus. Supplementary metadata contains 29,585 mouse MOE cells plus header with cell-state labels such as Bowman's gland."
    data_notes: "Useful only for cross-species cell-state/viral-entry context. It cannot validate human ORA age directions."
    path: "data/external/GSE151346_MOE_metadata.tsv.gz"
    required_files:
      expression: "data/external/GSE151346_MOE_all_counts.csv.gz"
      metadata: "data/external/GSE151346_MOE_metadata.tsv.gz"
      feature_matrix: null
    download_command: "curl -L -o data/external/GSE151346_MOE_metadata.tsv.gz https://ftp.ncbi.nlm.nih.gov/geo/series/GSE151nnn/GSE151346/suppl/GSE151346_MOE_metadata.tsv.gz"
    required_columns:
      donor_id: ["orig_ident", "sample"]
      age: ["age", "age_years"]
      disease_group: ["condition", "tissue"]
      cell_type: ["leiden_name", "cell_type", "annotation", "cluster"]
    notes: "Do not use as human validation. Keep as optional cross-species marker/context support for OE support cells, stem cells, and viral-entry biology."

  kim_2026_long_covid_olfactory_gex:
    title: "Analysis of local mucosal immune dysregulation to guide pilot directed therapy for long-COVID olfactory loss [5 prime GEX]"
    accession: "GSE290883"
    bioproject: "PRJNA1230710"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE290883"
    supplementary_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE290nnn/GSE290883/suppl/GSE290883_RAW.tar"
    status: "download_ready_context"
    validation_use: "human olfactory-biopsy long-COVID/hyposmia single-cell context; not healthy-aging ORA validation"
    species: "human"
    tissue: "olfactory epithelium"
    disease_context: ["long_covid_hyposmia", "normosmic_control"]
    expected_level: "single_cell"
    cohort_notes: "GEO reports olfactory biopsies from 3 long-COVID hyposmic and 3 normosmic control subjects."
    data_notes: "5 prime gene-expression data; paired TCR data are listed separately as GSE290884."
    path: "data/external/GSE290883_RAW.tar"
    required_files:
      expression: "data/external/GSE290883_RAW.tar"
      metadata: "data/external/GSE290883_series_matrix.txt.gz"
      feature_matrix: null
    download_command: "curl -L -o data/external/GSE290883_RAW.tar https://ftp.ncbi.nlm.nih.gov/geo/series/GSE290nnn/GSE290883/suppl/GSE290883_RAW.tar"
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Context/raw-adapter candidate only. The design addresses long-COVID olfactory loss, not healthy aging; do not use to promote primary ORA replication without new donor-level feature tests and guarded language."

  kim_2026_long_covid_olfactory_tcr:
    title: "Analysis of local mucosal immune dysregulation to guide pilot directed therapy for long-COVID olfactory loss [TCR-seq]"
    accession: "GSE290884"
    bioproject: "PRJNA1230710"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE290884"
    supplementary_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE290nnn/GSE290884/suppl/GSE290884_RAW.tar"
    status: "download_ready_context"
    validation_use: "paired TCR immune-context evidence for long-COVID olfactory loss; not ORA feature validation"
    species: "human"
    tissue: "olfactory epithelium"
    disease_context: ["long_covid_hyposmia", "normosmic_control", "immune_context"]
    expected_level: "single_cell_tcr"
    cohort_notes: "Paired TCR-seq for the GSE290883 long-COVID olfactory biopsy cohort."
    data_notes: "Immune repertoire context only; expression validation should use GSE290883."
    path: "data/external/GSE290884_RAW.tar"
    required_files:
      expression: "data/external/GSE290884_RAW.tar"
      metadata: "data/external/GSE290884_series_matrix.txt.gz"
      feature_matrix: null
    download_command: "curl -L -o data/external/GSE290884_RAW.tar https://ftp.ncbi.nlm.nih.gov/geo/series/GSE290nnn/GSE290884/suppl/GSE290884_RAW.tar"
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Do not use as primary ORA validation. It can only support immune-context discussion if downloaded and interpreted with the paired GEX cohort."

  janssens_2025_pd_hyposmia_brain:
    title: "Rescuing early Parkinson-induced hyposmia prevents dopaminergic system failure [human]"
    accession: "GSE235330"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE235330"
    status: "download_ready_context"
    validation_use: "PD hyposmia brain-region context; not olfactory epithelial ORA validation"
    species: "human"
    tissue: "brain regions: nucleus basalis of Meynert, nucleus accumbens, putamen"
    disease_context: ["pd", "hyposmia", "brain_context"]
    expected_level: "single_nucleus_brain"
    cohort_notes: "GEO describes human brain-region single-cell/snRNA-seq and fly material, not olfactory epithelium."
    data_notes: "Processed H5AD files are available through GEO supplementary links."
    path: null
    required_files:
      expression: null
      metadata: null
      feature_matrix: null
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Context only. Do not treat brain-region PD/hyposmia results as olfactory epithelial ORA validation."

  cartas_2026_nasal_sirt3_abeta:
    title: "Multi-omics characterization of SIRT3 metabolism and its adaptation to presence of amyloid-beta oligomers in nasal epithelial cells"
    accession: "GSE324335"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE324335"
