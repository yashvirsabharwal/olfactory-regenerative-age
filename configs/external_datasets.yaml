    disease_context: ["abeta", "nasal_epithelium", "cell_culture"]
    expected_level: "bulk_rnaseq_cell_culture"
    cohort_notes: "Immortalized nasal epithelial cell-culture perturbation study."
    data_notes: "Bulk RNA-seq context only; no donor-level olfactory aging design."
    path: null
    required_files:
      expression: null
      metadata: null
      feature_matrix: null
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Context only. Do not use for ORA replication, disease diagnosis, or olfactory epithelial donor-level claims."

  danniballe_2026:
    title: "Alzheimer's olfactory biopsy validation"
    status: "metadata_pending"
    validation_use: "AD olfactory disease projection and DE validation"
    species: "human"
    tissue: "olfactory biopsy"
    disease_context: ["ad", "healthy"]
    expected_level: "single_cell_or_spatial"
    path: null
    required_files:
      expression: null
      metadata: null
      feature_matrix: null
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
