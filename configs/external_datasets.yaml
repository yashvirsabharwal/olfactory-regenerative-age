datasets:
  durante_2020:
    title: "Human olfactory mucosa lineage reference"
    status: "metadata_pending"
    validation_use: "lineage marker and trajectory-order validation"
    species: "human"
    tissue: "olfactory mucosa"
    disease_context: ["healthy"]
    expected_level: "single_cell"
    path: null
    required_files:
      expression: null
      metadata: null
      feature_matrix: null
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Use for lineage/cell-state feature replication once source files are supplied."

  oliva_2022:
    title: "Aging-related olfactory loss is associated with olfactory stem cell transcriptional alterations in humans"
    accession: "GSE184117"
    bioproject: "PRJNA763212"
    sra: "SRP337058"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE184117"
    supplementary_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE184nnn/GSE184117/suppl/GSE184117_RAW.tar"
    status: "download_ready"
    validation_use: "aging and presbyosmia feature replication"
    species: "human"
    tissue: "olfactory epithelium"
    disease_context: ["aging", "presbyosmia"]
    expected_level: "single_cell"
    cohort_notes: "6 adult donors: 3 normosmic controls and 3 presbyosmic donors older than 65; plus one culture sample."
    data_notes: "Processed supplementary TAR contains MTX/TSV files; raw data also available in SRA."
    path: null
    required_files:
      expression: "GSE184117_RAW.tar"
      metadata: "GSE184117_RAW.tar"
      feature_matrix: null
    download_command: "curl -L -o data/external/GSE184117_RAW.tar https://ftp.ncbi.nlm.nih.gov/geo/series/GSE184nnn/GSE184117/suppl/GSE184117_RAW.tar"
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Primary external aging validation target. GEO summary states single-cell 3' RNA-seq of olfactory epithelium from normosmic and presbyosmic adults."

  fodoulian_2020:
    title: "A gateway for SARS-CoV-2 infection in the human olfactory neuroepithelium"
    accession: "GSE151973"
    bioproject: "PRJNA637909"
    sra: "SRP266345"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE151973"
    status: "download_ready_bulk_reference"
    validation_use: "bulk olfactory versus respiratory epithelium marker sanity check"
    species: "human"
    tissue: "olfactory neuroepithelium"
    disease_context: ["healthy_or_surgical_reference"]
    expected_level: "bulk_rnaseq"
    cohort_notes: "Bulk olfactory and nasal respiratory epithelium biopsies from adult surgical patients; useful for marker sanity checks but not donor-level ORA validation."
    path: null
    required_files:
      expression: "GSE151973_Human_OE_RE_RNAseq_quantifications.rds.gz"
      metadata: "GSE151973_Human_OE_RE_RNAseq_DE.csv.gz"
      feature_matrix: null
    download_command: "curl -L -O https://ftp.ncbi.nlm.nih.gov/geo/series/GSE151nnn/GSE151973/suppl/GSE151973_Human_OE_RE_RNAseq_DE.csv.gz"
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id", "patient"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis", "tissue"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Not a primary ORA validation dataset because it is bulk tissue RNA-seq, but useful for olfactory epithelial marker and OE/RE contrast checks."

  danniballe_2026:
    title: "Alzheimer's olfactory biopsy validation"
    status: "metadata_pending"
    validation_use: "AD olfactory disease projection and DE validation"
    species: "human"
    tissue: "olfactory biopsy"
    disease_context: ["ad", "healthy"]
    expected_level: "single_cell_or_spatial"
    path: null
    required_files:
      expression: null
      metadata: null
      feature_matrix: null
    required_columns:
      donor_id: ["donor_id", "individual", "subject_id"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
    notes: "Primary AD projection validation target once files or tables are available."

published_gene_lists:
  aging:
    description: "General cellular aging and senescence markers for external validation."
    source: "curated_initial"
    genes: [CDKN1A, CDKN2A, TP53, SERPINE1, MMP3, IL6, CXCL8, LMNB1]
  olfactory_regeneration:
    description: "Olfactory epithelial regeneration and neurogenesis markers."
    source: "curated_initial"
    genes: [TP63, KRT5, KRT14, SOX2, ASCL1, NEUROG1, NEUROD1, GAP43, DCX, OMP]
  neurodegeneration_risk:
    description: "AD/PD-associated genes used for cross-disease validation."
    source: "curated_initial"
    genes: [APP, PSEN1, PSEN2, MAPT, APOE, SNCA, LRRK2, PRKN, PINK1, PARK7, GBA1]
  neuroinflammation:
    description: "Myeloid/complement inflammatory response genes."
    source: "curated_initial"
    genes: [AIF1, C1QA, C1QB, C1QC, TREM2, TYROBP, LST1]

feature_matrix_contract:
  description: "Minimum donor-level table needed to test ORA feature replication outside Gateway."
  required_columns:
    - donor_id
    - age
    - disease_group
  optional_covariates:
    - sex
    - chemistry
    - collection_method
    - site
  accepted_feature_prefixes:
    - "prop__"
    - "clr__"
    - "ratio__"
    - "module_score__"

outputs:
  validation_summary_tsv: "results/tables/external_validation_summary.tsv"
  gene_list_coverage_tsv: "results/tables/external_gene_list_coverage.tsv"
  feature_contract_tsv: "results/tables/external_feature_contract.tsv"
  published_module_score_summary_tsv: "results/tables/published_module_score_summary.tsv"
  published_module_gene_list_coverage_tsv: "results/tables/published_module_gene_list_coverage.tsv"
  published_donor_module_features_tsv: "data/processed/published_donor_module_features.tsv"
