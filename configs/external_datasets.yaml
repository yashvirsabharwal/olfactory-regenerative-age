    required_columns:
      donor_id: ["donor_id", "individual", "subject_id", "patient"]
      age: ["age", "age_years"]
      disease_group: ["disease_group", "condition", "diagnosis", "tissue"]
      cell_type: ["cell_type", "fine_cell_type", "annotation"]
