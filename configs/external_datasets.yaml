published_gene_lists:
  aging:
    description: "General cellular aging and senescence markers for external validation."
    source: "curated_initial"
    genes: [CDKN1A, CDKN2A, TP53, SERPINE1, MMP3, IL6, CXCL8, LMNB1]
  olfactory_regeneration:
    description: "Olfactory epithelial regeneration and neurogenesis markers."
    source: "curated_initial"
    genes: [TP63, KRT5, KRT14, SOX2, ASCL1, NEUROG1, NEUROD1, GAP43, DCX, OMP]
  neurodegeneration_risk:
    description: "AD/PD-associated genes used for cross-disease validation."
    source: "curated_initial"
    genes: [APP, PSEN1, PSEN2, MAPT, APOE, SNCA, LRRK2, PRKN, PINK1, PARK7, GBA1]
  neuroinflammation:
    description: "Myeloid/complement inflammatory response genes."
    source: "curated_initial"
    genes: [AIF1, C1QA, C1QB, C1QC, TREM2, TYROBP, LST1]

feature_matrix_contract:
  description: "Minimum donor-level table needed to test ORA feature replication outside Gateway."
  required_columns:
    - donor_id
    - age
    - disease_group
  optional_covariates:
    - sex
    - chemistry
    - collection_method
    - site
  accepted_feature_prefixes:
    - "prop__"
    - "clr__"
    - "ratio__"
    - "module_score__"

outputs:
  validation_summary_tsv: "results/tables/external_validation_summary.tsv"
  gene_list_coverage_tsv: "results/tables/external_gene_list_coverage.tsv"
  feature_contract_tsv: "results/tables/external_feature_contract.tsv"
  published_module_score_summary_tsv: "results/tables/published_module_score_summary.tsv"
  published_module_gene_list_coverage_tsv: "results/tables/published_module_gene_list_coverage.tsv"
  published_donor_module_features_tsv: "data/processed/published_donor_module_features.tsv"
