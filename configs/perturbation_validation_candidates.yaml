metadata:
  updated: "2026-06-25"
  goal: "Find or design perturbation/organoid/ALI evidence for ORA regenerative-aging mechanisms."
  conclusion: "No clean adult human olfactory aging perturbation dataset was found. GSE309325 is now adapted as olfactory-relevant organoid infection context; GSE299529 remains the strongest nasal ALI cytokine perturbation lead."

search_log:
  - search_date: "2026-06-25"
    database_or_resource: "NCBI GEO DataSets / ESearch"
    query_or_filter: "\"olfactory\" AND \"organoid\" AND \"Homo sapiens\""
    result_summary: "Returned GSE309325 and unrelated glioblastoma superseries; GSE309325 is relevant."
  - search_date: "2026-06-25"
    database_or_resource: "NCBI GEO DataSets / ESearch"
    query_or_filter: "\"olfactory epithelium\" AND \"injury\" AND \"Homo sapiens\" AND \"RNA-seq\""
    result_summary: "No matching GEO DataSets hit."
  - search_date: "2026-06-25"
    database_or_resource: "NCBI GEO DataSets / ESearch"
    query_or_filter: "\"nasal epithelial cells\" AND \"cytokine\" AND \"RNA-seq\""
    result_summary: "Returned GSE299529, a nasal ALI TNF/TGF-beta scRNA-seq perturbation dataset."
  - search_date: "2026-06-25"
    database_or_resource: "NCBI GEO DataSets / ESearch"
    query_or_filter: "\"nasal epithelial\" AND \"interferon\" AND \"RNA-seq\""
    result_summary: "Returned nasal/airway viral or IFN-context datasets including GSE286616, GSE271245, and GSE309353."
  - search_date: "2026-06-25"
    database_or_resource: "Local ORA registry"
    query_or_filter: "configs/external_datasets.yaml cell-culture and nasal context entries"
    result_summary: "GSE324335 is a nasal epithelial SIRT3/amyloid-beta bulk RNA-seq context candidate."

candidates:
  - accession: "GSE309325"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE309325"
    title: "Analysis of SARS-CoV-2 replication using human nasal organoids comprising olfactory and respiratory epithelium"
    tissue_model: "human nasal epithelial organoids with olfactory and nasal respiratory epithelium"
    assay: "scRNA-seq"
    perturbations: "mock versus SARS-CoV-2 infection; 1, 2, 7, and 11 days post infection"
    mechanism_match: "viral injury, olfactory/respiratory organoid context, basal/NPC stress, support-cell infection response"
    data_access: "GEO supplementary RAW tar listed; GEO notes raw files for human/patient samples were not submitted because of personally identifiable sequence data concerns"
    adapter_decision: "adapter_completed_context_evidence"
    priority: 1
    directness: "olfactory_relevant_organoid_context"
    limitations: "infection perturbation rather than aging; organoid source/developmental maturity and raw-data caveat require audit"
    recommended_next_step: "Use generated module contrasts as infection/organoid context; optional next step is a cell-state-aware adapter if public cell annotations can be recovered."
  - accession: "GSE299529"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE299529"
    title: "scRNA-seq reveals persistent aberrant differentiation of nasal epithelium driven by TNF-alpha and TGF-beta in post-COVID syndrome"
    tissue_model: "healthy donor nasal epithelial cells differentiated at air-liquid interface"
    assay: "scRNA-seq; processed Seurat RDS"
    perturbations: "PBS control, TNF-alpha, TGF-beta, and combined TNF-alpha/TGF-beta"
    mechanism_match: "inflammatory cytokine, aberrant differentiation, respiratory/nasal epithelial remodeling"
    data_access: "processed Seurat RDS listed in GEO supplementary files"
    adapter_decision: "high_priority_adapter_candidate"
    priority: 1
    directness: "nasal_ali_mechanism_context"
    limitations: "nasal respiratory model rather than olfactory epithelium; R/Seurat conversion needed locally"
    recommended_next_step: "Convert Seurat RDS to h5ad or extract matrices, then score ORA/regeneration/metaplasia modules by perturbation."
  - accession: "GSE286616"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE286616"
    title: "Rhinovirus triggers distinct host responses through differential engagement of epithelial innate immune signaling"
    tissue_model: "ALI-cultured human nasal epithelial cells"
    assay: "bulk RNA-seq"
    perturbations: "mock, rhinovirus, rhinovirus plus IRF3 inhibitor, rhinovirus plus NF-kB inhibitor, combined inhibitors"
    mechanism_match: "IFN, NF-kB, viral injury, epithelial innate immune signaling"
    data_access: "RAW tar and normalized counts CSV are public"
    adapter_decision: "bulk_module_adapter_candidate"
    priority: 2
    directness: "nasal_ali_mechanism_context"
    limitations: "bulk RNA-seq; not olfactory tissue; viral-infection context"
    recommended_next_step: "Score curated ORA/regeneration modules on normalized counts; use as IFN/NF-kB directionality context."
  - accession: "GSE175541"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE175541"
    title: "RNA-Seq analysis of differentially expressed genes in UPM-exposed epithelium co-cultivated with macrophages and dendritic cells"
    tissue_model: "primary nasal epithelium co-culture with macrophages and dendritic cells"
    assay: "bulk RNA-seq"
    perturbations: "urban particulate matter exposure and immune co-culture across control/asthma/COPD sources"
    mechanism_match: "immune-epithelial stress, inflammation, particle injury"
    data_access: "processed data and SRA are public"
    adapter_decision: "context_only_bulk_adapter_optional"
    priority: 3
    directness: "nasal_inflammation_context"
    limitations: "asthma/COPD disease confounding; not olfactory; not aging"
    recommended_next_step: "Use only after higher-priority organoid/ALI adapters; focus on immune/stress module direction."
  - accession: "GSE324335"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE324335"
    title: "Multi-omics characterization of SIRT3 metabolism and its adaptation to the presence of amyloid-beta oligomers in nasal epithelial cells"
    tissue_model: "human nasal epithelial cell culture"
    assay: "bulk RNA-seq"
    perturbations: "SIRT3 silencing or overexpression with amyloid-beta oligomer context"
    mechanism_match: "oxidative/metabolic stress, amyloid-beta, neurodegeneration-context epithelial stress"
    data_access: "processed matrix listed in GEO supplementary files"
    adapter_decision: "context_only_bulk_adapter_optional"
    priority: 3
    directness: "nasal_cell_culture_context"
    limitations: "immortalized/cell-culture context; not donor-level olfactory aging"
    recommended_next_step: "Score oxidative stress, senescence, and neurodegeneration-context modules only if disease-context support is needed."
  - accession: "GSE271245"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE271245"
    title: "Airway epithelial hyperactivation of JAK-STAT signaling impairs type-III IFN responses during RSV infection in Down Syndrome"
    tissue_model: "pediatric airway epithelial cells"
    assay: "bulk RNA-seq"
    perturbations: "IFN-lambda/IL-29 or IFN-beta, RSV context"
    mechanism_match: "IFN/JAK-STAT signaling"
    data_access: "TPM counts public"
    adapter_decision: "low_priority_context_only"
    priority: 4
    directness: "airway_ifn_context"
    limitations: "pediatric/Down syndrome airway context; not nasal/olfactory aging"
    recommended_next_step: "Use only for IFN pathway sanity checks if higher-priority nasal datasets are insufficient."
  - accession: "GSE309353"
    source_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE309353"
    title: "RSV nonstructural protein 1 inhibits secretion of cytokines and chemokines by differentiated primary nasal epithelial cells cultured at air-liquid interface"
    tissue_model: "well-differentiated primary nasal epithelial cells at air-liquid interface"
    assay: "bulk RNA-seq"
    perturbations: "mock versus RSV wild-type and NS1 mutant strains"
    mechanism_match: "viral injury, IFN/cytokine response, nasal ALI"
    data_access: "RAW tar public"
    adapter_decision: "bulk_module_adapter_candidate"
    priority: 2
    directness: "nasal_ali_mechanism_context"
    limitations: "viral perturbation; not olfactory or aging"
    recommended_next_step: "Score IFN, cytokine, stress, and epithelial repair modules if viral-injury context is needed."

minimum_experiment:
  - experiment_id: adult_oe_organoid_cytokine
    model: "adult donor-derived olfactory epithelial organoids or organoid-like cultures with confirmed OE and respiratory compartments"
    perturbations: "TNF-alpha, IL17A/F, IFN-beta or IFN-gamma, combined TNF/TGF-beta, and vehicle"
    timepoints: "24h, 72h, and 7d recovery"
    readout: "scRNA-seq plus targeted IF/RNAscope for HBC, INP, immature OSN, mature OSN, sustentacular, respiratory, immune/stress modules"
    target_n: "at least 6 donors, ideally balanced across young/mid/old adult age bins"
  - experiment_id: injury_repair_axis
    model: "adult olfactory epithelial organoids or explant/ALI cultures"
    perturbations: "EGFR/AREG stimulation, Wnt activation/inhibition, Notch inhibition/activation, oxidative-stress pulse, senescence induction"
    timepoints: "baseline, injury, early recovery, late recovery"
    readout: "ORA/regeneration module scores, cell-state proportions, basal-to-neuronal maturation markers, and recovery trajectory"
    target_n: "paired donor design with repeated conditions; donor remains unit of inference"
